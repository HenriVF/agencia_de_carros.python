{% extends 'base.html' %}
{% block content %}


<div class="container mt-3">
    <h2>{{'Editar Cliente' if cliente else 'Novo Cliente'}}</h2>


    <form method="post">
        <div class="mb-3">
            <label for="nome" class="form-label">Nome:</label>
            <input type="text" class="form-control" id="nome" name="nome"
            value="{{ cliente.nome if cliente else ''}}" required>
        </div>


        <div class="mb-3">
            <label for="email" class="form-label">Email:</label>
            <input type="email" class="form-control" id="email" name="email"
            value="{{ cliente.email if cliente else ''}}" required>
        </div>


        <div class="mb-3">
            <label for="telefone" class="form-label">Telefone:</label>
            <input type="text" class="form-control" id="telefone" name="telefone"
            value="{{ cliente.telefone if cliente else ''}}" required>
        </div>


        <div class="mb-3">
            <label for="endereco" class="form-label">Endereço:</label>
            <input type="text" class="form-control" id="endereco" name="endereco"
            value="{{ cliente.endereco if cliente else ''}}" required>
        </div>


        <button type="submit" class="btn btn-primary">Salvar</button>


        <a href="{{url_for('clientes')}}" class="btn btn-secondary">Cancelar</a>


    </form>
</div>


{% endblock %}
