{% extends 'base.html' %}
{% block content %}
<h3>{{ 'Editar Venda' if venda else 'Nova Venda' }}</h3>
<form method="POST">
  <!-- Clientes -->
  <select class="form-control mb-2" name="cliente_id" required>
    <option value="">Selecione o Cliente</option>
    {% for c in clientes %}
      <option value="{{ c.id }}"
        {% if venda and venda.cliente_id == c.id %}selected{% endif %}>
        {{ c.nome }}
      </option>
    {% endfor %}
  </select>


  <!-- Veículos -->
  <select class="form-control mb-2" name="veiculo_id" required>
    <option value="">Selecione o Veículo</option>
    {% for v in veiculos %}
      <option value="{{ v.id }}"
        {% if venda and venda.veiculo_id == v.id %}selected{% endif %}>
        {{ v.marca }} {{ v.modelo }}
      </option>
    {% endfor %}
  </select>


  <!-- Valor da venda -->
  <input class="form-control mb-2" type="number" step="0.01" name="valor"
         placeholder="Valor da Venda"
         value="{{ venda.valor if venda else '' }}" required>


  <button class="btn btn-primary">Salvar</button>
</form>
{% endblock %}
